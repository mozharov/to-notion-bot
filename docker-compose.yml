services:
  bot:
    build:
      context: .
    environment:
      - NODE_ENV=production
      - PORT=8443
      - BOT_TOKEN=${BOT_TOKEN:?Set BOT_TOKEN in Coolify environment variables}
      - BOT_WEBHOOK_SECRET=${BOT_WEBHOOK_SECRET:?Set BOT_WEBHOOK_SECRET in Coolify environment variables}
      - HOST=${HOST:?Set HOST to the public URL Coolify assigns this app, e.g. https://bot.example.com}
      - DB_URL=/data/bot.sqlite3
      - DB_MIGRATE=${DB_MIGRATE:-true}
      - NOTION_CLIENT_ID=${NOTION_CLIENT_ID:?Set NOTION_CLIENT_ID in Coolify environment variables}
      - NOTION_SECRET_TOKEN=${NOTION_SECRET_TOKEN:?Set NOTION_SECRET_TOKEN in Coolify environment variables}
      - TG_ADMIN_ID=${TG_ADMIN_ID:?Set TG_ADMIN_ID in Coolify environment variables}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Optional — only forwarded to the container if set on the host/Coolify,
      # otherwise the defaults in src/config.ts apply.
      - NGROK_TOKEN
      - BOT_ID
      - BOT_NAME
      - BOT_USERNAME
      - MAX_CHATS_PER_USER
      - MAX_WORKSPACES_PER_USER
      - SUBSCRIPTION_MONTHLY_PRICE_USD
      - SUBSCRIPTION_YEARLY_PRICE_USD
      - SUBSCRIPTION_LIFETIME_PRICE_USD
      - TELEGRAM_STARS_TO_USD
      - MAX_PROMOCODE_LENGTH
      - POSTHOG_API_KEY
    volumes:
      - bot-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8443/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 30s

  landing:
    build:
      context: ./landing
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bot-data:
