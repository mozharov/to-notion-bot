server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = / {
        return 302 /privacy;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    location = /terms {
        try_files /terms.html =404;
    }

    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
